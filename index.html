<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1e293b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LPG Tracer" />
  <meta name="description" content="LPG cylinder chain-of-custody traceability with RFID scanning" />
  <title>LPG Tracer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <input id="scanner-input" autocomplete="off" autocorrect="off" autocapitalize="off"
         spellcheck="false" inputmode="none" aria-hidden="true" tabindex="-1" />

  <div id="app">

    <header>
      <div class="header-left">
        <h1>LPG Tracer</h1>
        <p class="subtitle">Chain-of-custody &middot; RFID</p>
      </div>
      <div class="header-pills">
        <button id="operator-pill" class="pill pill-operator" title="Set operator ID">
          <span id="operator-pill-icon">👤</span>
          <span id="operator-pill-label">Set Operator</span>
        </button>
        <button id="gps-pill" class="pill pill-gps" title="Enable GPS location">
          <span id="gps-pill-icon">📍</span>
          <span id="gps-pill-label">GPS Off</span>
        </button>
        <span id="unsynced-badge" class="unsynced-badge" style="display:none">0</span>
      </div>
    </header>

    <div id="views">

      <div id="view-scan" class="view">
        <div class="scan-event-bar">
          <div class="scan-event-label">Log as:</div>
          <div id="event-type-pills" class="event-type-pills">
            <button class="event-pill active" data-type="filled">Filled</button>
            <button class="event-pill" data-type="dispatched">Dispatched</button>
            <button class="event-pill" data-type="delivered">Delivered</button>
            <button class="event-pill" data-type="returned">Returned</button>
            <button class="event-pill" data-type="inspected">Inspected</button>
            <button class="event-pill" data-type="condemned">Condemned</button>
          </div>
        </div>

        <div class="scan-batch-bar">
          <label class="toggle-label">
            <span>Batch mode</span>
            <div class="toggle-wrap">
              <input type="checkbox" id="batch-toggle" />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </div>
          </label>
          <button id="batch-submit-btn" class="btn btn-primary" style="display:none">
            Submit Batch <span id="batch-count-badge" class="count-badge">0</span>
          </button>
        </div>

        <div id="batch-list-section" style="display:none">
          <div class="section-header">
            <span>Batch Queue</span>
            <button id="batch-clear-btn" class="link-btn">Clear all</button>
          </div>
          <ul id="batch-list" class="batch-list"></ul>
        </div>

        <div id="scan-focus-section">
          <button id="focus-btn" class="focus-btn">
            <span id="focus-icon">⌨️</span>
            <span id="focus-label">Tap to start scanning</span>
          </button>
          <p class="focus-hint">Keep this app in focus while scanning</p>
        </div>

        <div id="last-scan-area" style="display:none" class="last-scan-area"></div>
      </div>

      <div id="view-cylinders" class="view" style="display:none">
        <div class="search-filter-bar">
          <input type="search" id="cyl-search" class="search-input" placeholder="Search serial or ID…" />
          <div id="cyl-filter-pills" class="filter-pills">
            <button class="filter-pill active" data-filter="all">All</button>
            <button class="filter-pill" data-filter="available">Available</button>
            <button class="filter-pill" data-filter="in-use">In Use</button>
            <button class="filter-pill" data-filter="condemned">Condemned</button>
          </div>
        </div>
        <ul id="cyl-list" class="cyl-list"></ul>
      </div>

      <div id="view-alerts" class="view" style="display:none">
        <div id="alerts-container" class="alerts-container"></div>
      </div>

      <div id="view-reports" class="view" style="display:none">
        <div id="stats-grid" class="stats-grid"></div>
        <div class="reports-actions">
          <button id="btn-export-events" class="btn btn-secondary">Export Events CSV</button>
          <button id="btn-export-cylinders" class="btn btn-secondary">Export Cylinders CSV</button>
          <button id="btn-sync" class="btn btn-primary">Sync to Server</button>
          <button id="btn-print" class="btn btn-ghost">Print Report</button>
        </div>
        <div id="sync-status" class="sync-status" style="display:none"></div>
      </div>

    </div>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="scan">
        <span class="nav-icon">📷</span>
        <span class="nav-label">Scan</span>
      </button>
      <button class="nav-btn" data-view="cylinders">
        <span class="nav-icon">🗂️</span>
        <span class="nav-label">Cylinders</span>
      </button>
      <button class="nav-btn" data-view="alerts">
        <span class="nav-icon">🔔</span>
        <span class="nav-label">Alerts</span>
        <span id="alerts-nav-badge" class="nav-badge" style="display:none">0</span>
      </button>
      <button class="nav-btn" data-view="reports">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Reports</span>
      </button>
    </nav>

  </div>

  <div id="modal-cylinder" class="modal-overlay" style="display:none" role="dialog" aria-modal="true">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2 class="modal-title">Cylinder Passport</h2>
        <button class="modal-close" data-close="modal-cylinder">✕</button>
      </div>
      <div class="modal-body" id="modal-cylinder-body"></div>
    </div>
  </div>

  <div id="modal-register" class="modal-overlay" style="display:none" role="dialog" aria-modal="true">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2 class="modal-title">Register New Cylinder</h2>
        <button class="modal-close" data-close="modal-register">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row"><label class="form-label">Tag ID</label><input id="reg-tag-id" class="form-input" readonly /></div>
        <div class="form-row"><label class="form-label">Serial Number *</label><input id="reg-serial" class="form-input" placeholder="e.g. LPG-2026-013" /></div>
        <div class="form-row"><label class="form-label">Manufacture Date *</label><input id="reg-mfg-date" class="form-input" type="date" /></div>
        <div class="form-row"><label class="form-label">Tare Weight (kg)</label><input id="reg-tare" class="form-input" type="number" step="0.1" value="14.5" /></div>
        <div class="form-row"><label class="form-label">Capacity (kg)</label><input id="reg-capacity" class="form-input" type="number" step="0.5" value="12" /></div>
        <div class="form-row"><label class="form-label">Max Fills</label><input id="reg-maxfills" class="form-input" type="number" value="500" /></div>
        <div class="form-row"><label class="form-label">Last Hydro Test Date</label><input id="reg-hydrotest" class="form-input" type="date" /></div>
        <div class="form-row"><label class="form-label">Notes</label><textarea id="reg-notes" class="form-input form-textarea" placeholder="Optional notes…"></textarea></div>
        <button id="reg-submit-btn" class="btn btn-primary btn-full">Register Cylinder</button>
      </div>
    </div>
  </div>

  <div id="modal-operator" class="modal-overlay" style="display:none" role="dialog" aria-modal="true">
    <div class="modal-sheet modal-sheet-sm">
      <div class="modal-header">
        <h2 class="modal-title">Operator ID</h2>
        <button class="modal-close" data-close="modal-operator">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row"><label class="form-label">Your Operator ID</label><input id="op-input" class="form-input" placeholder="e.g. OP-001" maxlength="20" /></div>
        <button id="op-save-btn" class="btn btn-primary btn-full">Save</button>
      </div>
    </div>
  </div>

  <div id="modal-batch" class="modal-overlay" style="display:none" role="dialog" aria-modal="true">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2 class="modal-title">Batch Complete</h2>
        <button class="modal-close" data-close="modal-batch">✕</button>
      </div>
      <div class="modal-body" id="modal-batch-body"></div>
    </div>
  </div>

  <div id="snackbar"></div>

  <script src="app.js"></script>
</body>
</html>
